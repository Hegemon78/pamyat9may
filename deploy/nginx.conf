server {
    listen 80;
    server_name pamyat9may.ru www.pamyat9may.ru;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pamyat9may.ru www.pamyat9may.ru;

    # SSL certificates (certbot)
    ssl_certificate /etc/letsencrypt/live/pamyat9may.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pamyat9may.ru/privkey.pem;

    # Static site (Astro build output)
    root /var/www/pamyat9may/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy bot API
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
